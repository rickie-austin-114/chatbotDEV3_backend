services:

  # ── Embedding model (bge-m3) on GPU 0 ─────────────────────────────────────
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:1.7
    container_name: chatbotDEV3_embedding
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    volumes:
      - /data/Qwen:/data
    command: --model-id BAAI/bge-m3 --dtype float16
    ports:
      - "8324:80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  # ── Reranker model (bge-reranker-v2-m3) on GPU 1 ──────────────────────────
  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:1.7
    container_name: chatbotDEV3_reranker
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
    volumes:
      - /data/Qwen:/data
    command: --model-id BAAI/bge-reranker-v2-m3 --dtype float16
    ports:
      - "8325:80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  # ── FastAPI RAG chatbot ────────────────────────────────────────────────────
  chatbot:
    build: .
    container_name: chatbotDEV3
    ports:
      - "8014:8014"
    env_file:
      - .env
    volumes:
      - ../FAQ_combined:/FAQ_combined:ro
      - ../FAQ_combined/lexicon:/FAQ_combined/lexicon:ro
      - ./cache:/app/cache
      - ./data:/app/data
      - ./logs:/app/logs
      - ./hf_cache:/root/.cache/huggingface
    depends_on:
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8014/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
